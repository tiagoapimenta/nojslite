<!doctype html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NoJSLite</title>
<style>
h1 img {
  width: 2em;
  vertical-align: middle;
}
table, thead, tbody, tr, th, td {
  border-width: 1px;
  border-style: solid;
  border-collapse: collapse;
  padding: 5pt;
}
</style>
</head>
<script src="options.js"></script>
<body>
<h1><img src="icon.svg"> NoJSLite Settings</h1>
<details>
  <summary>Expert Settings</summary>
  Cookie First Party Isolate:
  <span id="isolateLabel">unknown</span>
  <label><input type="radio" name="isolate" value="default"> Default</label>
  <label><input type="radio" name="isolate" value="true"> Force Enabled</label>
  <label><input type="radio" name="isolate" value="false"> Force Disabled</label><br>
  Resist Fingerprint:
  <span id="resistLabel">unknown</span>
  <label><input type="radio" name="resist" value="default"> Default</label>
  <label><input type="radio" name="resist" value="true"> Force Enabled</label>
  <label><input type="radio" name="resist" value="false"> Force Disabled</label><br>
  New Tab Position:
  <span id="positionLabel">unknown</span>
  <label><input type="radio" name="position" value="default"> Default</label>
  <label><input type="radio" name="position" value="true"> Force After Current</label>
  <label><input type="radio" name="position" value="false"> Force After Related</label>
</details>
<table>
<thead>
<tr>
  <th>Domain</th>
  <th>JS</th>
  <th>Cookie</th>
  <th>Subdomain</th>
  <th>Remove</th>
</tr>
</thead>
<tbody id="data">
</tbody>
</table>
<input type="button" id="add" value="➕">
</body>
</html>
