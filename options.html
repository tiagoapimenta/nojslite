<!doctype html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NoJSLite</title>
<style>
h1 img {
  width: 2em;
  vertical-align: middle;
}
table, thead, tbody, tr, th, td {
  border-width: 1px;
  border-style: solid;
  border-collapse: collapse;
  padding: 5pt;
}
</style>
</head>
<body>
<h1><img src="icon.svg"> NoJSLite Settings</h1>
<details>
  <summary>Expert Settings</summary>
  Cookie First Party Isolate:
  <span id="isolateLabel">unknown</span>
  <label><input type="radio" name="isolate" id="isolateDefault"> Default</label>
  <label><input type="radio" name="isolate" id="isolateTrue"> Force Enabled</label>
  <label><input type="radio" name="isolate" id="isolateFalse"> Force Disabled</label><br>
  Resist Fingerprint:
  <span id="resistLabel">unknown</span>
  <label><input type="radio" name="resist" id="resistDefault"> Default</label>
  <label><input type="radio" name="resist" id="resistTrue"> Force Enabled</label>
  <label><input type="radio" name="resist" id="resistFalse"> Force Disabled</label><br>
  New Tab Position:
  <span id="positionLabel">unknown</span>
  <label><input type="radio" name="position" id="positionDefault"> Default</label>
  <label><input type="radio" name="position" id="positionTrue"> Force After Current</label>
  <label><input type="radio" name="position" id="positionFalse"> Force After Related</label>
</details>
<table>
<thead>
<tr>
  <th>Domain</th>
  <th>JS</th>
  <th>CSS</th>
  <th>subdomain</th>
  <th>Action</th>
</tr>
<thead>
<tbody id="data">
</tbody>
<!--
❌ remove
✏️ edit
💾 save
↩️ cancel


js css sub keep bottom
-->
</table>
<input type="button" id="add" value="➕">
</body>
</html>
